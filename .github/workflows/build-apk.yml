name: Build APK

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: peer_app
        run: flutter pub get

      - name: Build APK
        working-directory: peer_app
        run: flutter build apk

      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-' | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk/${{ steps.branch.outputs.name }}
          name: "APK — ${{ github.ref_name }}"
          prerelease: ${{ github.ref_name != 'main' }}
          body: |
            Automated APK build from branch `${{ github.ref_name }}`.
            Commit: ${{ github.sha }}
          files: peer_app/build/app/outputs/flutter-apk/app-release.apk
